<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="font-family: sans-serif; color: #333; line-height: 1.6; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2>Support Portal</h2>
    <p>We received a {{ purpose }} request for your account.</p>
    
    <div style="background-color: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; text-align: center; margin: 24px 0;">
        <p style="margin: 0 0 10px; color: #718096; font-size: 14px;">Your 6-digit verification code is:</p>
        <span style="font-size: 32px; font-weight: bold; letter-spacing: 4px; color: #2b6cb0;">{{ otp_code }}</span>
    </div>
    
    <p>This code will expire in {{ expiry_minutes }} minutes.</p>
    <p>If you did not request this code, please securely ignore this email.</p>
    
    <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 30px 0;">
    <p style="font-size: 12px; color: #a0aec0;">&copy; Support Portal. All rights reserved.</p>
</body>
</html>
