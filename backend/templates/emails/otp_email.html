<!doctype html>
<html>
  <body style="font-family: Arial, sans-serif; color: #0f172a;">
    <div style="max-width: 520px; margin: 0 auto; padding: 24px; border: 1px solid #e2e8f0; border-radius: 12px;">
      <h2 style="margin-top: 0;">Support Portal Verification</h2>
      <p>Your {{ purpose }} OTP is:</p>
      <div style="font-size: 32px; letter-spacing: 8px; font-weight: 700; margin: 24px 0; color: #0f766e;">
        {{ otp_code }}
      </div>
      <p>This code expires in {{ expiry_minutes }} minutes.</p>
      <p style="font-size: 12px; color: #64748b;">If you did not request this code, you can ignore this email.</p>
    </div>
  </body>
</html>
